<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldmark Wallet - Secure Transfers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container">
            <span class="navbar-brand mb-0 h1">💰 Goldmark Wallet</span>
            <span class="text-light">Balance: <strong id="balanceDisplay">$0.00</strong></span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Setup Account -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">🔧 Create Account</h5>
                    </div>
                    <div class="card-body">
                        <form id="setupForm">
                            <div class="mb-3">
                                <label for="userEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="userEmail" placeholder="your@email.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Account</button>
                        </form>
                        <div id="setupMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Transfer Funds -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">💸 Transfer Funds</h5>
                    </div>
                    <div class="card-body">
                        <form id="transferForm">
                            <div class="mb-3">
                                <label for="senderId" class="form-label">Your User ID</label>
                                <input type="number" class="form-control" id="senderId" placeholder="Enter your ID" required>
                            </div>
                            <div class="mb-3">
                                <label for="receiverId" class="form-label">Receiver User ID</label>
                                <input type="number" class="form-control" id="receiverId" placeholder="Recipient's ID" required>
                            </div>
                            <div class="mb-3">
                                <label for="transferAmount" class="form-label">Amount ($)</label>
                                <input type="number" class="form-control" id="transferAmount" placeholder="0.00" step="0.01" min="0" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Send Transfer</button>
                        </form>
                        <div id="transferMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">📋 Transaction History</h5>
                    </div>
                    <div class="card-body">
                        <div id="historyContainer">
                            <p class="text-muted">Enter your User ID above to view history</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
